# ====================================================
# Liquibase Maven Plugin Configuration
# ====================================================
# File: src/main/resources/liquibase.properties

# Changelog file location
changeLogFile=db/changelog/db.changelog-master.xml

# Database connection settings
url=jdbc:postgresql://localhost:5432/household_store
username=postgres
password=postgres
driver=org.postgresql.Driver

# Schema configuration
defaultSchemaName=household_schema
liquibaseSchemaName=household_schema
liquibaseTablespaceName=

# Runtime settings
verbose=true
dropFirst=false
outputDefaultSchema=true
outputDefaultCatalog=true

# Contexts for different environments
contexts=main

# Logging
logLevel=INFO

# Diff settings (for generating migrations from entities)
diffTypes=tables,columns,views,foreignKeys,primaryKeys,indexes