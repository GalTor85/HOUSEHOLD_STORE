# ==================================================
# GENERAL APPLICATION SETTINGS
# ==================================================
spring.application.name=household-store
app.default.locale=ru
spring.data.web.pageable.serialization-mode=via_dto
app.logging.locale=en

# ============================================================================
# CORS CONFIGURATION
# ============================================================================
# For development: exact origins (optional, patterns are preferred)
app.cors.allowed-origins=http://localhost:3000,http://localhost:8080

# For production with HTTPS: use patterns (supports wildcards)
# Example: https://*.yourdomain.com,https://localhost:*
app.cors.allowed-origin-patterns=https://localhost:*,https://*.yourdomain.com

app.cors.max-age=3600

# ============================================================================
# BUSINESS CONFIGURATION
# ============================================================================

# Cart Configuration
app.business.cart.expiry-days=30
app.business.cart.max-items=100
app.business.cart.max-quantity-per-item=999
app.business.cart.default-increment-value=1

# Stock Configuration
app.business.stock.low-stock-threshold=10
app.business.stock.max-quantity=999999

# Pagination Configuration
app.business.pagination.default-page=0
app.business.pagination.default-size=20
app.business.pagination.max-size=100

# User Configuration
app.business.user.min-password-length=6
app.business.user.min-name-length=2
app.business.user.max-name-length=50
app.business.user.max-email-length=100
app.business.user.max-phone-length=15
app.business.user.max-address-length=500
app.business.user.max-surname-length=50
app.business.user.allowed-special-chars=@#$%^&*!

app.business.bank-account.max-name-length=100
app.business.bank-account.max-bank-name-length=200

# ============================================================================
# FINANCIAL CONFIGURATION
# ============================================================================

# Currency Configuration
app.financial.default-currency=RUB
app.financial.default-decimal-places=2
app.financial.default-exchange-rate=1.0000
app.financial.default-active=true
app.financial.default-base=true

# Invoice Configuration
app.financial.invoice.purchase-due-days=30
app.financial.invoice.retail-due-days=7
app.financial.invoice.wholesale-due-days=30

# Discounts Configuration
app.financial.discounts.wholesale=5.0
app.financial.discounts.vip=10.0
app.financial.discounts.partner=7.0
app.financial.discounts.employee=15.0

# Invoice settings
app.invoice.purchase.due-days=30
app.invoice.sales.retail.due-days=7
app.invoice.sales.wholesale.due-days=30

# ============================================================================
# PAYMENT CONFIGURATION
# ============================================================================

# Processing
app.payment.processing.fee-scale=2
app.payment.processing.percent-base=100
app.payment.processing.rounding-mode=HALF_UP
app.payment.processing.transaction-id-random-length=8

# Sberbank
app.payment.providers.sberbank.enabled=true
app.payment.providers.sberbank.fee-percent=1.5
app.payment.providers.sberbank.connect-timeout=30000
app.payment.providers.sberbank.read-timeout=30000
app.payment.providers.sberbank.payment-url=https://securepayments.sberbank.ru/rest/register.do
app.payment.providers.sberbank.refund-url=https://securepayments.sberbank.ru/rest/refund.do
app.payment.providers.sberbank.status-url=https://securepayments.sberbank.ru/rest/getOrderStatus.do
app.payment.providers.sberbank.transaction-prefix=SB
app.payment.providers.sberbank.return-url=https://yourdomain.com/payment/sberbank/return
app.payment.providers.sberbank.webhook-url=https://yourdomain.com/webhook/sberbank

# YooMoney
app.payment.providers.yoomoney.enabled=false
app.payment.providers.yoomoney.fee-percent=0.8
app.payment.providers.yoomoney.connect-timeout=30000
app.payment.providers.yoomoney.read-timeout=30000
app.payment.providers.yoomoney.payment-url=https://api.yookassa.ru/v3/payments
app.payment.providers.yoomoney.refund-url=https://api.yookassa.ru/v3/refunds
app.payment.providers.yoomoney.status-url=https://api.yookassa.ru/v3/payments/{id}
app.payment.providers.yoomoney.transaction-prefix=YM
app.payment.providers.yoomoney.return-url=https://yourdomain.com/payment/yoomoney/return
app.payment.providers.yoomoney.webhook-url=https://yourdomain.com/webhook/yoomoney

# Qiwi
app.payment.providers.qiwi.enabled=false
app.payment.providers.qiwi.fee-percent=1.0
app.payment.providers.qiwi.connect-timeout=30000
app.payment.providers.qiwi.read-timeout=30000
app.payment.providers.qiwi.payment-url=https://api.qiwi.com/partner/v2/bills
app.payment.providers.qiwi.refund-url=https://api.qiwi.com/partner/v2/bills/{id}/refund
app.payment.providers.qiwi.status-url=https://api.qiwi.com/partner/v2/bills/{id}
app.payment.providers.qiwi.transaction-prefix=QIWI
app.payment.providers.qiwi.return-url=https://yourdomain.com/payment/qiwi/return
app.payment.providers.qiwi.webhook-url=https://yourdomain.com/webhook/qiwi

# PayPal
app.payment.providers.paypal.enabled=false
app.payment.providers.paypal.fee-percent=2.9
app.payment.providers.paypal.fee-fixed=0.30
app.payment.providers.paypal.connect-timeout=30000
app.payment.providers.paypal.read-timeout=30000
app.payment.providers.paypal.payment-url=https://api-m.paypal.com/v2/checkout/orders
app.payment.providers.paypal.refund-url=https://api-m.paypal.com/v2/payments/captures/{id}/refund
app.payment.providers.paypal.status-url=https://api-m.paypal.com/v2/checkout/orders/{id}
app.payment.providers.paypal.transaction-prefix=PP
app.payment.providers.paypal.return-url=https://yourdomain.com/payment/paypal/return
app.payment.providers.paypal.webhook-url=https://yourdomain.com/webhook/paypal

# Stripe
app.payment.providers.stripe.enabled=false
app.payment.providers.stripe.fee-percent=2.9
app.payment.providers.stripe.fee-fixed=0.30
app.payment.providers.stripe.connect-timeout=30000
app.payment.providers.stripe.read-timeout=30000
app.payment.providers.stripe.payment-url=https://api.stripe.com/v1/payment_intents
app.payment.providers.stripe.refund-url=https://api.stripe.com/v1/refunds
app.payment.providers.stripe.status-url=https://api.stripe.com/v1/payment_intents/{id}
app.payment.providers.stripe.transaction-prefix=STRIPE
app.payment.providers.stripe.return-url=https://yourdomain.com/payment/stripe/return
app.payment.providers.stripe.webhook-url=https://yourdomain.com/webhook/stripe

# ==================================================
# DEFAULT TECHNICAL SETTINGS
# ==================================================
app.warehouse.default-id=1
app.warehouse.default-code=WH-DEFAULT
app.warehouse.default-name=Main Warehouse
app.warehouse.default-description=Default warehouse for the system
app.warehouse.default-address=System Default Address
app.warehouse.default-capacity=1000
app.warehouse.default-barcode-format=CODE_128
app.warehouse.default-barcode-prefix=WH-DEFAULT-BARCODE-
app.warehouse.default-visible-for-sale=true

app.data.initialize=true

# Stock display settings
app.stock.display.low-stock-threshold=10
app.stock.display.cache-minutes=5
app.stock.display.show-exact-quantity=true

# ============================================================================
# DATABASE INITIALIZER DEFAULTS
# ============================================================================
app.defaults.admin.email=admin@household.store
app.defaults.admin.password=Admin123!
app.defaults.admin.first-name=Admin
app.defaults.admin.last-name=Admin
app.defaults.admin.role=ADMIN

app.defaults.manager.email=manager@household.store
app.defaults.manager.password=Manager123!
app.defaults.manager.first-name=Manager
app.defaults.manager.last-name=Manager
app.defaults.manager.role=MANAGER
app.defaults.manager.user-type=EMPLOYEE

# ==================================================
# INTERNATIONALIZATION
# ==================================================
spring.web.locale-resolver=accept-header
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false

# ==================================================
# DATABASE CONFIGURATION
# ==================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/household_store?currentSchema=household_schema&useUnicode=true&characterEncoding=UTF-8
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-init-sql=CREATE SCHEMA IF NOT EXISTS household_schema; SET client_encoding = 'UTF8'
app.scheduling.token-cleanup-cron=0 0 2 * * ?

# Hibernate DDL mode: validate - only checks schema, does NOT modify it
# Schema changes are managed by Liquibase migrations
spring.jpa.hibernate.ddl-auto=none

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=household_schema
spring.jpa.properties.hibernate.connection.charSet=UTF-8
spring.jpa.properties.hibernate.connection.characterEncoding=UTF-8
spring.jpa.properties.hibernate.connection.useUnicode=true

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ==================================================
# LIQUIBASE DATABASE MIGRATIONS
# ==================================================
# Enable Liquibase migration execution
spring.liquibase.enabled=true

# Path to the master changelog file
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

# Default schema name for migrations
spring.liquibase.default-schema=household_schema

# Safety check: prevent dropping the database on startup
spring.liquibase.drop-first=false

# Internal Liquibase tracking tables
spring.liquibase.database-change-log-table=DATABASECHANGELOG
spring.liquibase.database-change-log-lock-table=DATABASECHANGELOGLOCK

# Execution contexts (e.g., prod, test, dev)
spring.liquibase.contexts=${LIQUIBASE_CONTEXTS:main}

spring.liquibase.lock-wait-time-in-seconds=300

# ==================================================
# SWAGGER / OPENAPI DOCUMENTATION
# ==================================================
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.packages-to-scan=ru.galtor85
springdoc.paths-to-match=/**
springdoc.default-consumes-media-type=application/json
springdoc.default-produces-media-type=application/json
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=method

# ==================================================
# JWT AUTHENTICATION
# ==================================================
# Access token validity in milliseconds (1 hour)
app.jwt.access-token-validity=3600000

# Refresh token validity in milliseconds (24 hours)
app.jwt.refresh-token-validity=86400000

# JWT secret key (should be overridden in production)
app.jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}

# JWT key length in bytes (256 bits = 32 bytes for AES-256) */
app.jwt.key-length=32

# ==================================================
# SERVER CONFIGURATION
# ==================================================
server.port=8443
server.servlet.context-path=/
server.forward-headers-strategy=framework

# SSL/TLS Configuration
server.ssl.key-store=${SSL_KEYSTORE_PATH:classpath:keystore.p12}
server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD:changeit}
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=${SSL_KEY_ALIAS:tomcat}

# ==================================================
# ACTUATOR MONITORING
# ==================================================
management.endpoints.web.exposure.include=health,info
management.endpoints.web.base-path=/actuator
management.endpoint.health.show-details=always

# ==================================================
# LOGGING CONFIGURATION
# ==================================================
# Application log level
logging.level.ru.galtor85=DEBUG

# Liquibase migration logs
logging.level.liquibase=INFO

# Console log format
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# File logging
logging.file.name=logs/household-store.log

# ==================================================
# FILE STORAGE
# ==================================================
# Directory for uploaded files
app.file.upload-dir=uploads

# Maximum file size in bytes (10 MB)
app.file.max-size=10485760

# Allowed MIME types for uploads
app.file.allowed-types=image/jpeg,image/png,image/gif,image/webp,video/mp4,application/pdf