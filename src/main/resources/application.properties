# ==================================================
# ОБЩИЕ НАСТРОЙКИ
# ==================================================
spring.application.name=household-store
app.language=ru

# ==================================================
# НАСТРОЙКИ ПО УМОЛЧАНИЮ (ТОЛЬКО ТЕХНИЧЕСКИЕ)
# ==================================================
app.warehouse.default-id=1
app.warehouse.default-code=WH-DEFAULT

app.currency.default-code=RUB
app.currency.default-exchange-rate=1.0000
app.currency.default-decimal-places=2
app.currency.default-active=true
app.currency.default-base=true

# ==================================================
# ИНТЕРНАЦИОНАЛИЗАЦИЯ
# ==================================================
spring.web.locale-resolver=accept-header
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false

# ==================================================
# БАЗА ДАННЫХ
# ==================================================
#spring.datasource.url=jdbc:postgresql://localhost:5432/household_store?currentSchema=household_schema&useUnicode=true&characterEncoding=UTF-8
#spring.datasource.username=postgres
#spring.datasource.password=postgres
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
#spring.datasource.hikari.connection-init-sql=SET client_encoding = 'UTF8'; CREATE SCHEMA IF NOT EXISTS household_schema

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=household_schema
spring.jpa.properties.hibernate.connection.charSet=UTF-8
spring.jpa.properties.hibernate.connection.characterEncoding=UTF-8
spring.jpa.properties.hibernate.connection.useUnicode=true

# ==================================================
# SWAGGER / OPENAPI
# ==================================================
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.packages-to-scan=ru.galtor85
springdoc.paths-to-match=/**
springdoc.default-consumes-media-type=application/json
springdoc.default-produces-media-type=application/json
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=method

# ==================================================
# JWT
# ==================================================
app.jwt.access-token-validity=3600000
app.jwt.refresh-token-validity=86400000
app.jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}

# ==================================================
# СЕРВЕР
# ==================================================
server.port=8443
server.servlet.context-path=/
server.forward-headers-strategy=framework
server.ssl.key-store=${SSL_KEYSTORE_PATH:classpath:keystore.p12}
server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD:changeit}
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=${SSL_KEY_ALIAS:tomcat}

# ==================================================
# ACTUATOR
# ==================================================
management.endpoints.web.exposure.include=health,info
management.endpoints.web.base-path=/actuator
management.endpoint.health.show-details=always

# ==================================================
# ЛОГИРОВАНИЕ
# ==================================================
logging.level.ru.galtor85=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.file.name=logs/household-store.log

# ==================================================
# ФАЙЛОВОЕ ХРАНИЛИЩЕ
# ==================================================
app.file.upload-dir=uploads
app.file.max-size=10485760
app.file.allowed-types=image/jpeg,image/png,image/gif,image/webp,video/mp4,application/pdf