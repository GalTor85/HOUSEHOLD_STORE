# ==================================================
# ОБЩИЕ НАСТРОЙКИ
# ==================================================
spring.application.name=household-store


app.language=

# Отключаем автоматическое создание тегов
springdoc.auto-tag=false

# Отключаем создание тегов из путей
springdoc.model-and-view-allowed=false
springdoc.override-with-generic-response=false

# Явно указываем, что теги должны быть только из @Tag аннотаций
springdoc.use-management-port=false
springdoc.show-actuator=false

# Интернационализация
spring.web.locale-resolver=accept-header
#spring.web.locale=ru
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false
spring.messages.always-use-message-format=false
spring.messages.use-code-as-default-message=false

# ==================================================
# БАЗА ДАННЫХ
# ==================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/household_store?currentSchema=household_schema
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10


# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=household_schema
spring.jpa.properties.hibernate.hbm2ddl.auto=update
spring.datasource.hikari.schema=household_schema
spring.datasource.hikari.connection-init-sql=CREATE SCHEMA IF NOT EXISTS household_schema


# ==================================================
# THYMELEAF
# ==================================================
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false
spring.thymeleaf.check-template=true
spring.thymeleaf.check-template-location=true

# ==================================================
# MVC
# ==================================================
spring.mvc.static-path-pattern=/static/**

# Сессии
spring.session.timeout=30m

# ==================================================
# SWAGGER / OPENAPI
# ==================================================
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.groups-order=DESC
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.oauth2-redirect-url=/swagger-ui/oauth2-redirect.html
springdoc.swagger-ui.oauth.client-id=swagger
springdoc.swagger-ui.oauth.client-secret=swagger-secret
springdoc.packages-to-scan=ru.galtor85
springdoc.paths-to-match=/**
springdoc.cache.disabled=true
springdoc.default-consumes-media-type=application/json
springdoc.default-produces-media-type=application/json

# ==================================================
# SWAGGER / OPENAPI LOCAL
# ==================================================

springdoc.api-docs.resolve-properties=true
springdoc.api-docs.resolve-schema-properties=true

# ==================================================
# JWT
# ==================================================
app.jwt.access-token-validity=3600000
app.jwt.refresh-token-validity=86400000
app.jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
app.environment.LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_BOOT_WEB_EMBEDDED_TOMCAT=DEBUG
app.environment.LOGGING_LEVEL_ORG_APACHE_TOMCAT_UTIL_NET=DEBUG

# ==================================================
# СЕРВЕР
# ==================================================
server.port=8443
server.servlet.context-path=/
server.forward-headers-strategy=framework
server.error.include-message=always
server.error.include-binding-errors=always
server.ssl.key-store=${SSL_KEYSTORE_PATH:classpath:keystore.p12}
server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD:changeit}
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=${SSL_KEY_ALIAS:tomcat}

# ==================================================
# ACTUATOR
# ==================================================
management.endpoints.web.exposure.include=health,info,metrics,openapi,swagger-ui
management.endpoints.web.base-path=/actuator
management.endpoint.health.enabled=true
management.endpoint.health.show-details=always
management.endpoint.info.enabled=true
management.info.env.enabled=true

# ==================================================
# ЛОГИРОВАНИЕ
# ==================================================
logging.level.com.zaxxer.hikari=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.web=INFO
logging.level.org.springdoc=DEBUG
logging.level.ru.galtor85=DEBUG
logging.level.org.springframework.jdbc=DEBUG

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/household-store.log
logging.file.max-size=10MB
logging.file.max-history=30