# ==================================================
# TEST PROFILE CONFIGURATION
# ==================================================

# Use H2 in-memory database for tests
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=


# JPA settings
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Disable Liquibase for tests (use Hibernate auto DDL)
spring.liquibase.enabled=false

# Disable data initializers
app.data.initialize=false
app.payment-methods.initialize=false

# Logging
logging.level.ru.galtor85=DEBUG