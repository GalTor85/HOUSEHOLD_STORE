# ==================================================
# DOCKER PROFILE CONFIGURATION
# ==================================================

# ==================================================
# DATABASE
# ==================================================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==================================================
# JPA
# ==================================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ==================================================
# LIQUIBASE
# ==================================================
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.liquibase.default-schema=household_schema
spring.liquibase.drop-first=false
spring.liquibase.database-change-log-table=DATABASECHANGELOG
spring.liquibase.database-change-log-lock-table=DATABASECHANGELOGLOCK
spring.liquibase.lock-wait-time-in-seconds=300

# ==================================================
# DATA INITIALIZATION
# ==================================================
app.data.initialize=true

# ==================================================
# SERVER
# ==================================================
server.port=${SERVER_PORT:8443}
server.ssl.key-store=file:/app/keystore/keystore.p12
server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD:changeit}
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=${SSL_KEY_ALIAS:tomcat}

# ==================================================
# LOGGING
# ==================================================
logging.level.ru.galtor85=INFO
logging.level.liquibase=INFO
logging.file.name=/app/logs/household-store.log

# ==================================================
# FILE STORAGE
# ==================================================
app.file.upload-dir=/app/uploads

# ==================================================
# SWAGGER (отключить в production)
# ==================================================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.api-docs.lazy-load=false