# ==================================================
# DOCKER PROFILE CONFIGURATION
# ==================================================

# ==================================================
# DATABASE
# ==================================================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==================================================
# JPA (только проверка, изменения через Liquibase)
# ==================================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# ==================================================
# LIQUIBASE
# ==================================================
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.liquibase.liquibase-schema=household_schema
spring.liquibase.default-schema=household_schema
spring.liquibase.drop-first=false
spring.liquibase.database-change-log-table=DATABASECHANGELOG
spring.liquibase.database-change-log-lock-table=DATABASECHANGELOGLOCK

# ==================================================
# DATA INITIALIZATION
# ==================================================
app.data.initialize=true

# ==================================================
# SERVER
# ==================================================
server.port=${SERVER_PORT:8443}
server.ssl.key-store=file:/app/keystore/keystore.p12
server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD:changeit}
server.ssl.key-store-type=PKCS12

# ==================================================
# LOGGING
# ==================================================
logging.level.liquibase=DEBUG
logging.file.name=/app/logs/household-store.log

# ==================================================
# FILE STORAGE
# ==================================================
app.file.upload-dir=/app/uploads

# Логирование для отладки

logging.level.org.hibernate.tool.schema=DEBUG