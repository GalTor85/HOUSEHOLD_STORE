services:
  postgres:
    image: postgres:15-alpine
    container_name: household-postgres
    environment:
      POSTGRES_DB: household_store
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-docker.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d household_store"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - household-network
    restart: unless-stopped

  app:
    build: .
    container_name: household-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/household_store?currentSchema=household_schema&useUnicode=true&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
      SPRING_LIQUIBASE_ENABLED: "true"
      APP_DATA_INITIALIZE: "true"
      SERVER_PORT: 8443
      LOGGING_LEVEL_LIQUIBASE: DEBUG
    ports:
      - "8443:8443"
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
      - ./keystore.p12:/app/keystore/keystore.p12:ro
    networks:
      - household-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  household-network:
    driver: bridge